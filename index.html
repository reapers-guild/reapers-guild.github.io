    <script>

        let currentLang = 'es';

        function changeLanguage(lang) {
            currentLang = lang;
            
            // 1. Traducir todos los elementos con [data-key] (Tabs, Títulos, etc)
            $('[data-key]').each(function() {
                const key = $(this).data('key');
                if (i18n[lang][key]) {
                    $(this).text(i18n[lang][key]);
                }
            });

            // 2. Traducir específicamente los textos de la tabla de Almacén
            $('#th-icon').text(i18n[lang].th_icon);
            $('#th-item').text(i18n[lang].th_item);
            $('#th-stock').text(i18n[lang].th_stock);
            
            // 3. Actualizar los textos de DataTables
            if ($.fn.DataTable.isDataTable('#tablaReapers')) {
                const table = $('#tablaReapers').DataTable();
                
                // Actualizamos la configuración de lenguaje del objeto DataTable
                table.context[0].oLanguage.sSearch = i18n[lang].search_label;
                table.context[0].oLanguage.sInfo = i18n[lang].info_table;
                table.context[0].oLanguage.sZeroRecords = i18n[lang].zero_records;
                
                // Redibujar para aplicar cambios visuales en el buscador
                $('.dataTables_filter label').contents().filter(function() {
                    return this.nodeType === 3;
                }).first().replaceWith(i18n[lang].search_label);
            }
        }

        function verSeccion(id, btn) {

            reproducirSonido(); 

            // 1. Cambiar visibilidad de secciones
            $('.content-section').removeClass('active');
            $(`#sec-${id}`).addClass('active');
            
            // 2. Cambiar estado del botón
            $('.btn-tab').removeClass('active');
            if (btn) {
                $(btn).addClass('active');
            } else {
                // Busca el botón que tiene la función verSeccion con ese ID
                $(`.btn-tab[onclick*="'${id}'"]`).addClass('active');
            }

            // 3. Actualizar la URL limpia (ej: /deudores)
            // Usamos history.pushState para que no aparezca el #
            window.history.pushState({ seccion: id }, "", id);
        }

        // --- TU FUNCIÓN CARGAR DATOS ORIGINAL (ALMACÉN)[cite: 4] ---
        function cargarDatos() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=2029872222&single=true&output=csv';
            Papa.parse(csvUrl, {
                download: true,
                complete: function(results) {
                    const rows = results.data;
                    let html = '';
                    const headerRowIdx = rows.findIndex(r => r.some(c => c && c.includes('Artículo')));
                    if (headerRowIdx !== -1) {
                        const headers = rows[headerRowIdx];
                        const colItem = headers.findIndex(h => h.includes('Artículo'));
                        const colStock = headers.findIndex(h => h.includes('Existencia'));
                        rows.slice(headerRowIdx + 1).forEach(row => {
                            const nombre = row[colItem] ? row[colItem].trim() : '';
                            const stock = row[colStock] ? row[colStock].trim() : '0';
                            const imgPath = row[32] ? row[32].trim() : ''; 
                            if (nombre && nombre !== "" && !nombre.includes('Total de puntos')) {
                                html += `<tr><td class="text-center"><img src="${imgPath}" class="item-icon mx-auto" onerror="this.src='https://valhalla-rising.com/favicon.ico';"></td><td class="font-semibold text-slate-100">${nombre}</td><td class="text-right stock-number">${stock}</td></tr>`;
                            }
                        });
                    }
                    $('#cuerpoTabla').html(html);
                    $('#tablaReapers').DataTable({
                        destroy: true, pageLength: 50, order: [[2, 'desc']],
                        language: { search: "BUSCAR EN EL TESORO:", info: "Mostrando _TOTAL_ artículos", zeroRecords: "No se han encontrado suministros", paginate: { next: "Siguiente", previous: "Anterior" } }
                    });
                }
            });
        }

        // --- FUNCIÓN REPARTO (AC y AD)[cite: 2] ---
        function cargarReparto() {
            const urlReparto = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv';
            Papa.parse(urlReparto, { download: true, complete: function(results) {
                let hD = '', hAdmin = '', hAH = '';
                results.data.slice(4).forEach(r => {
                    if (r[1]) hD += `<tr><td><img src="${r[28]}" class="img-mini"></td><td>${r[1]}</td><td class="pts-orange">${r[3]}</td></tr>`;
                    if (r[4]) hAdmin += `<tr><td>${r[4]}</td><td class="pts-orange">${r[6]}</td></tr>`;
                    if (r[8]) hAH += `<tr><td><img src="${r[29]}" class="img-mini"></td><td>${r[8]}</td><td class="text-center">${r[9]}</td><td class="pts-orange">${r[10]}</td></tr>`;
                });
                $('#listaDiscord').html(hD); $('#listaAdmin').html(hAdmin); $('#listaAH').html(hAH);
            }});
        }

        // --- FUNCIÓN ACTIVIDAD (RANKING)[cite: 2, 3] ---
        function cargarActividad() {
            const urlActividad = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=801467735&single=true&output=csv';
            Papa.parse(urlActividad, { download: true, complete: function(results) {
                const data = results.data;
                let lista = [];
                for (let i = 4; i < data.length; i++) {
                    const nick = data[i][7]; // Col H[cite: 2]
                    const avg = data[i][16]; // Col Q[cite: 2]
                    if (nick && avg && nick !== "Nick") {
                        const valNum = parseFloat(avg.replace('%', '').replace(',', '.').trim()) || 0;
                        lista.push({ nick, avg, valNum });
                    }
                }
                lista.sort((a, b) => b.valNum - a.valNum); //[cite: 3]
                let html = '';
                lista.forEach((u, i) => {
                    const color = u.valNum >= 50 ? 'pct-high' : 'pct-low';
                    html += `<div class="ranking-row"><div style="font-family:Cinzel,serif;color:#c5a059;width:40px;">#${i+1}</div><div style="flex-grow:1;font-weight:bold;text-transform:uppercase;">${u.nick}</div><div class="${color}" style="padding:4px 12px;border-radius:4px;font-weight:900;min-width:85px;text-align:center;">${u.avg}</div></div>`;
                });
                $('#listaActividad').html(html);
            }});
        }

        function cargarDeudores() {
            const urlPuntos = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmqkTpsU-nFe_DmHlwG28zHEtZU_RkhD6VxNZGX4XdC2Di6JPSBrTXTF6pKeIP737mHOL6eZwqJuW6/pub?gid=854086504&single=true&output=csv';
            
            Papa.parse(urlPuntos, { 
                download: true, 
                complete: function(results) {
                    const data = results.data;
                    let deudores = [];
                    let positivos = [];
                    
                    for (let i = 3; i < data.length; i++) {
                        const nombre = data[i][12]; // Columna M
                        const puntosStr = data[i][13]; // Columna N
                        
                        if (nombre && puntosStr) {
                            const puntosVal = parseInt(puntosStr.replace('.', '').trim()) || 0;
                            if (puntosVal < 0) {
                                deudores.push({ nombre, puntos: puntosVal });
                            } else if (puntosVal > 0) {
                                positivos.push({ nombre, puntos: puntosVal });
                            }
                        }
                    }
                    
                    // Ordenar: Positivos de mayor a menor, Deudores de más negativo a menos
                    positivos.sort((a, b) => b.puntos - a.puntos);
                    deudores.sort((a, b) => a.puntos - b.puntos);
                    
                    // Generar HTML Positivos (Verde)
                    let htmlPos = '';
                    positivos.forEach(p => {
                        htmlPos += `
                        <div class="ranking-row" style="border-left: 4px solid #22c55e; margin-bottom: 5px; background: rgba(34, 197, 94, 0.05); padding: 8px 15px;">
                            <div style="flex-grow:1; font-weight:bold; text-transform:uppercase; font-size: 0.85rem;">${p.nombre}</div>
                            <div class="pct-high" style="padding:2px 8px; border-radius:4px; font-weight:900; min-width:70px; text-align:center; font-size: 0.85rem;">
                                ${p.puntos} PTS
                            </div>
                        </div>`;
                    });

                    // Generar HTML Deudores (Rojo)
                    let htmlDeu = '';
                    deudores.forEach(d => {
                        htmlDeu += `
                        <div class="ranking-row" style="border-left: 4px solid #ef4444; margin-bottom: 5px; background: rgba(239, 68, 68, 0.05); padding: 8px 15px;">
                            <div style="flex-grow:1; font-weight:bold; text-transform:uppercase; font-size: 0.85rem;">${d.nombre}</div>
                            <div class="pct-low" style="padding:2px 8px; border-radius:4px; font-weight:900; min-width:70px; text-align:center; font-size: 0.85rem;">
                                ${d.puntos} PTS
                            </div>
                        </div>`;
                    });
                    
                    $('#listaPositivos').html(htmlPos || '<p class="text-center text-slate-500 py-4 text-xs">No hay saldos positivos.</p>');
                    $('#listaDeudores').html(htmlDeu || '<p class="text-center text-slate-500 py-4 text-xs">No hay deudores.</p>');
                }
            });
        }


        $(document).ready(function() {
            // Carga de tus datos de Google Sheets
            cargarDatos();
            cargarReparto();
            cargarActividad();
            cargarDeudores();

            // LEER LA URL ACTUAL
            // window.location.pathname devuelve algo como "/reparto" o "/tu-repo/reparto"
            const pathParts = window.location.pathname.split("/");
            const lastPart = pathParts.pop() || pathParts.pop(); // Maneja si termina en /
            
            const seccionesValidas = ['almacen', 'reparto', 'actividad', 'reaperspoints'];

            if (seccionesValidas.includes(lastPart)) {
                verSeccion(lastPart);
            } else {
                // Si la ruta es la raíz o no existe, mostrar Almacén
                verSeccion('almacen');
            }

            // Permitir que funcionen las flechas de "Atrás" y "Adelante" del navegador
            window.onpopstate = function(event) {
                if (event.state && event.state.seccion) {
                    // Solo cambiamos la sección visualmente sin volver a ejecutar pushState
                    $('.content-section').removeClass('active');
                    $(`#sec-${event.state.seccion}`).addClass('active');
                    $('.btn-tab').removeClass('active');
                    $(`.btn-tab[onclick*="'${event.state.seccion}'"]`).addClass('active');
                }
            };
        });
        const audioClick = new Audio('iCreateWindow.wav');
        audioClick.volume = 0.1; // Ajusta aquí el volumen general (0.5 es un buen equilibrio)

        function reproducirSonido() {
            // Solo se ejecuta si el ancho de pantalla es de 768px o más (Escritorio)
            if (window.innerWidth >= 768) {
                // Clonamos el audio para que cada clic sea independiente
                const sonidoClonado = audioClick.cloneNode();
                sonidoClonado.volume = audioClick.volume;
                
                sonidoClonado.play().catch(e => {
                    console.log("Interacción requerida o error de carga:", e);
                });
                
                // Limpiar el clon de la memoria después de sonar
                setTimeout(() => {
                    sonidoClonado.remove();
                }, 500);
            }
            // Si es menor a 768px (Mobile), la función no hace nada
        }
    </script>
</body>
</html>
